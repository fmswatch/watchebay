name: Günlük Ebay Tarayıcı

on:
  schedule:
    - cron: '0 6,12,18 * * *'  # Günde 3 defa otomatik çalışır (Her çalıştığında yeni ilanları yakalar)
  workflow_dispatch:     # Manuel (elle) başlatma butonunu açar

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Kodları Depodan Çek
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Botu Çalıştır
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python main.py
